# Slinky Slurm Operator Health Check
#
# Validates that the Slinky Slurm operator and its admission webhook are
# running and healthy in the `slinky` namespace. Checks that both
# deployments have at least one available replica and that no pods in
# the namespace are stuck in Pending, Failed, or Unknown phases.
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: slinky-slurm-operator-health-check
spec:
  timeouts:
    assert: 5m
  steps:
    - name: validate-operator-deployment
      try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: slurm-operator
                namespace: slinky
              status:
                (availableReplicas > `0`): true
    - name: validate-webhook-deployment
      try:
        # Webhook must be ready before any Slinky CR can be created.
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: slurm-operator-webhook
                namespace: slinky
              status:
                (availableReplicas > `0`): true
    - name: validate-all-pods-healthy
      try:
        # Catch Pending / Failed / Unknown phases AND pods stuck in
        # Running with a known-bad container-waiting reason
        # (CrashLoopBackOff, ImagePullBackOff, ErrImagePull,
        # CreateContainerConfigError). Chainsaw `error` passes
        # vacuously when no resource matches, so the preceding deployment-
        # availability asserts are load-bearing: they guarantee the pods
        # exist before this step runs.
        - error:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                namespace: slinky
              status:
                phase: Pending
        - error:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                namespace: slinky
              status:
                phase: Failed
        - error:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                namespace: slinky
              status:
                phase: Unknown
        # JMESPath projection (not single-element match): kyverno-json's
        # sliceNode.Assert gates on exact slice length before per-element
        # comparison, so a `containerStatuses: - state: ...` shape only
        # matches single-container pods and silently passes sidecars. Use
        # `containerStatuses[?...] | length(@) > 0` to fire on any
        # container at any index. Parallel initContainerStatuses block
        # below catches init-container failures (invisible to
        # containerStatuses). Per PR #1245 review (@ArangoGutierrez).
        - error:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                namespace: slinky
              status:
                (containerStatuses[?state.waiting.reason == 'CrashLoopBackOff' || state.waiting.reason == 'ImagePullBackOff' || state.waiting.reason == 'ErrImagePull' || state.waiting.reason == 'CreateContainerConfigError'] | length(@) > `0`): true
        - error:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                namespace: slinky
              status:
                (initContainerStatuses[?state.waiting.reason == 'CrashLoopBackOff' || state.waiting.reason == 'ImagePullBackOff' || state.waiting.reason == 'ErrImagePull' || state.waiting.reason == 'CreateContainerConfigError'] | length(@) > `0`): true
