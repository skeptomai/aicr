# Slinky Slurm cluster health check.
#
# Names assume the AICR localformat release name `slinky-slurm`; the
# trailing `-slinky` comes from the chart's default map-key for
# loginsets/nodesets. Other deployers using a different release name
# need a parameterized variant of this check.
# TODO: parameterize CR/workload names once chainsaw supports name-pattern
# matching (currently hardcoded; flux/argocd deployers will rewrite release
# names and silently break these asserts).
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: slinky-slurm-health-check
spec:
  timeouts:
    assert: 10m
  steps:
    - name: validate-controller-cr
      try:
        - assert:
            resource:
              apiVersion: slinky.slurm.net/v1beta1
              kind: Controller
              metadata:
                name: slinky-slurm
                namespace: slurm
    - name: validate-loginset-cr
      try:
        - assert:
            resource:
              apiVersion: slinky.slurm.net/v1beta1
              kind: LoginSet
              metadata:
                name: slinky-slurm-login-slinky
                namespace: slurm
    - name: validate-nodeset-cr
      try:
        - assert:
            resource:
              apiVersion: slinky.slurm.net/v1beta1
              kind: NodeSet
              metadata:
                name: slinky-slurm-worker-slinky
                namespace: slurm
    - name: validate-restapi-cr
      try:
        - assert:
            resource:
              apiVersion: slinky.slurm.net/v1beta1
              kind: RestApi
              metadata:
                name: slinky-slurm
                namespace: slurm
    # CR existence alone does not prove reconciliation into running
    # pods: assert each workload reports a ready replica before the
    # pod-phase guard runs against the namespace.
    - name: validate-controller-statefulset-ready
      try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: StatefulSet
              metadata:
                name: slinky-slurm-controller
                namespace: slurm
              status:
                (availableReplicas > `0`): true
    - name: validate-login-deployment-ready
      try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: slinky-slurm-login-slinky
                namespace: slurm
              status:
                (availableReplicas > `0`): true
    - name: validate-restapi-deployment-ready
      try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: slinky-slurm-restapi
                namespace: slurm
              status:
                (availableReplicas > `0`): true
    - name: validate-nodeset-ready
      try:
        # NodeSet exposes its own status; operator tracks per-node counts.
        - assert:
            resource:
              apiVersion: slinky.slurm.net/v1beta1
              kind: NodeSet
              metadata:
                name: slinky-slurm-worker-slinky
                namespace: slurm
              status:
                (availableReplicas > `0`): true
    - name: validate-all-pods-healthy
      try:
        # Catch Pending / Failed / Unknown phases AND pods stuck in
        # Running with a known-bad container-waiting reason
        # (CrashLoopBackOff, ImagePullBackOff, ErrImagePull,
        # CreateContainerConfigError). Chainsaw `error` passes
        # vacuously when no resource matches, so the preceding workload-
        # readiness asserts (StatefulSet / Deployments / NodeSet) are
        # load-bearing: they guarantee the pods exist before this step runs.
        - error:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                namespace: slurm
              status:
                phase: Pending
        - error:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                namespace: slurm
              status:
                phase: Failed
        - error:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                namespace: slurm
              status:
                phase: Unknown
        # JMESPath projection (not single-element match): kyverno-json's
        # sliceNode.Assert gates on exact slice length before per-element
        # comparison, so a `containerStatuses: - state: ...` shape only
        # matches single-container pods and silently passes sidecars. Use
        # `containerStatuses[?...] | length(@) > 0` to fire on any
        # container at any index. Parallel initContainerStatuses block
        # below catches init-container failures (invisible to
        # containerStatuses). Per PR #1245 review (@ArangoGutierrez).
        - error:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                namespace: slurm
              status:
                ((containerStatuses || `[]`)[?state.waiting.reason == 'CrashLoopBackOff' || state.waiting.reason == 'ImagePullBackOff' || state.waiting.reason == 'ErrImagePull' || state.waiting.reason == 'CreateContainerConfigError'] | length(@) > `0`): true
        - error:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                namespace: slurm
              status:
                ((initContainerStatuses || `[]`)[?state.waiting.reason == 'CrashLoopBackOff' || state.waiting.reason == 'ImagePullBackOff' || state.waiting.reason == 'ErrImagePull' || state.waiting.reason == 'CreateContainerConfigError'] | length(@) > `0`): true
