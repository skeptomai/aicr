# Keep this fork's `main` at or ahead of NVIDIA/aicr `main`.
#
# Runs daily and on demand. A scheduled workflow only fires from the default
# branch, so this file must live on `main`; that means `main` is permanently
# one commit ahead of upstream and the sync is a merge, not a fast-forward.
# This is intentional and consistent with the workflow rule "always at or
# forward of upstream main." Real work should still branch off `upstream/main`,
# never off this fork's `main`.
#
# This only ever advances the fork; it never pushes to or rewrites upstream.

name: Sync fork with upstream

on:
  schedule:
    - cron: '23 7 * * *'  # daily, 07:23 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sync-fork-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork main
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Merge upstream/main into fork main
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/NVIDIA/aicr.git
          git fetch --no-tags upstream main
          # Merge upstream changes. The fork's only divergence is this workflow
          # file, which upstream does not touch, so this never conflicts and
          # always leaves main >= upstream tip. A no-op when already current.
          git merge --no-edit -m "chore: sync fork main with upstream" upstream/main
          git push origin HEAD:main
